<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airdrop Hub</title>

    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

.container{
    display:flex;
    min-height:100vh;
}

/* Sidebar */

.sidebar{
    width:250px;
    background:#111827;
    padding:20px;
    border-right:1px solid #1f2937;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#38bdf8;
    margin-bottom:40px;
}

.menu{
    list-style:none;
}

.menu li{
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
}

.menu li:hover{
    background:#1e293b;
}

.menu li.active{
    background:#2563eb;
}

/* Content */

.content{
    flex:1;
    padding:30px;
}

.title{
    font-size:32px;
    margin-bottom:25px;
}

/* Cards */

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

.card h2{
    font-size:18px;
    color:#94a3b8;
    margin-bottom:10px;
}

.number{
    font-size:40px;
    font-weight:bold;
    color:#38bdf8;
}

/* Search */

.search{
    margin:30px 0;
}

.search input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    font-size:16px;
}

/* Project */

.project{
    background:#1e293b;
    border-radius:15px;
    padding:20px;
}

.project h3{
    margin-bottom:15px;
}

.empty{
    text-align:center;
    color:#94a3b8;
    padding:50px;
}

/* Responsive */

@media(max-width:800px){

.container{
    flex-direction:column;
}

.sidebar{
    width:100%;
}

.cards{
    grid-template-columns:1fr;
}

}

    </style>

</head>
<body>

<div class="container">

<div class="sidebar">

<div class="logo">
Airdrop Hub
</div>

<ul class="menu">

<li class="active">🏠 Dashboard</li>

<li>📁 Projects</li>

<li>👛 Wallet</li>

<li>⭐ Watchlist</li>

<li>📝 Notes</li>

<li>⚙ Settings</li>

</ul>

</div>

<div class="content">

<div class="title">
Dashboard
</div>

<div class="cards">

<div class="card">
<h2>Active Project</h2>
<div class="number">0</div>
</div>

<div class="card">
<h2>Wallet</h2>
<div class="number">0</div>
</div>

<div class="card">
<h2>Today's Task</h2>
<div class="number">0</div>
</div>

<div class="card">
<h2>Completed</h2>
<div class="number">0</div>
</div>

</div>

<div class="search">

<input
type="text"
placeholder="Cari Project...">

</div>

<div class="project">

<h3>Project</h3>

<div class="empty">

Belum ada project.

</div>

</div>

</div>

</div>

</body>
</html>
