<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airdrop Hub</title>

<link rel="stylesheet" href="css/style.css">
<script defer src="js/app.js"></script>

</head>

<body>

<div class="container">

    <aside class="sidebar">

        <h1 class="logo">Airdrop Hub</h1>

        <ul class="menu">
            <li class="active">🏠 Dashboard</li>
            <li>📁 Projects</li>
            <li>👛 Wallets</li>
            <li>📅 Daily Tasks</li>
            <li>⭐ Watchlist</li>
            <li>📝 Notes</li>
            <li>⚙️ Settings</li>
        </ul>

    </aside>

    <main class="content">

        <h2 class="title">Dashboard</h2>

        <section class="cards">

            <div class="card">
                <span>Active Projects</span>
                <h3 id="activeProjects">0</h3>
            </div>

            <div class="card">
                <span>Wallets</span>
                <h3 id="wallets">0</h3>
            </div>

            <div class="card">
                <span>Today's Tasks</span>
                <h3 id="todayTasks">0</h3>
            </div>

            <div class="card">
                <span>Completed</span>
                <h3 id="completed">0</h3>
            </div>

        </section>

        <section class="search">
            <input id="searchInput" type="text" placeholder="Cari Project...">
        </section>

        <section class="project">

            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                <h2>Projects</h2>
                <button id="addProject">+ Add Project</button>
            </div>

            <div id="projectList">
                <div class="empty">
                    Belum ada project.
                </div>
            </div>

        </section>

    </main>

</div>

</body>
</html>
