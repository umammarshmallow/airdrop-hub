<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airdrop Hub</title>

<link rel="stylesheet" href="css/style.css">
<script defer src="js/app.js"></script>

</head>

<body>

<div class="container">

    <aside class="sidebar">

        <div class="logo">
            🚀 AIRDROP HUB
        </div>

        <ul class="menu">

            <li class="active">🏠 Dashboard</li>

            <li>📁 Projects</li>

            <li>👛 Wallets</li>

            <li>📅 Daily Tasks</li>

            <li>⭐ Watchlist</li>

            <li>📝 Notes</li>

            <li>⚙ Settings</li>

        </ul>

    </aside>

    <main class="content">

        <h1>Dashboard</h1>

        <div class="cards">

            <div class="card">
                <span>Active Projects</span>
                <h2 id="activeProjects">0</h2>
            </div>

            <div class="card">
                <span>Wallets</span>
                <h2 id="wallets">0</h2>
            </div>

            <div class="card">
                <span>Today's Tasks</span>
                <h2 id="todayTasks">0</h2>
            </div>

            <div class="card">
                <span>Completed</span>
                <h2 id="completed">0</h2>
            </div>

        </div>

        <div class="search">

            <input
                type="text"
                id="searchInput"
                placeholder="Cari project...">

        </div>

        <div class="project">

            <div class="project-header">

                <h2>Projects</h2>

                <button id="addProject">
                    + Add Project
                </button>

            </div>

            <div id="projectList">

                <div class="empty">

                    Belum ada project.

                </div>

            </div>

        </div>

    </main>

</div>

</body>
</html>
